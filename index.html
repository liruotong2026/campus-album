<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no 禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>高校宣讲回顾</title>
    <style>
        /* --- 全局重置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
           body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background-color: #f7f8fa;
            color: #333;
            /* 禁止身体滚动，由容器滚动 */
            overflow: hidden; 
            height: 100%;
            /* 防止 iOS 橡皮筋效果 */
            position: fixed;
            width: 100%;
        }

        /* --- 主容器 --- */
        .app-container {
            height: 100%;
            width: 100%;
            overflow-y: auto; /* 允许内部滚动 */
            -webkit-overflow-scrolling: touch; /* iOS 平滑滚动 */
            background-color: #fff;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            /* 确保内容超出时能滚动 */
            overscroll-behavior-y: contain; 
        }

        /* --- 导航栏 --- */
        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 50px;
        }

        .nav-title { font-size: 17px; font-weight: 600; color: #000; }
        .back-btn { font-size: 14px; color: #576b95; cursor: pointer; display: none; padding: 5px; }

        /* --- 页面切换 --- */
        .page { display: none; padding: 16px; animation: slideIn 0.3s ease-out; }
        .page.active { display: block; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* --- 列表页样式 --- */
        .school-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #f5f5f5;
        }
        .school-card:active { background-color: #fafafa; }
        
        .card-info h3 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
        .card-info p { font-size: 12px; color: #999; }
        .arrow { color: #ccc; font-size: 18px; }

        /* --- 详情页样式 --- */
        .detail-header { margin-bottom: 20px; padding-left: 4px; }
        .detail-title { font-size: 22px; font-weight: bold; margin-bottom: 6px; }
        .detail-date { font-size: 13px; color: #888; }

        .photo-wall {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding-bottom: 40px;
        }

        .photo-item {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background-color: #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- 全屏看图器 --- */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .lightbox.show { display: flex; opacity: 1; }
        .lightbox img { max-width: 100%; max-height: 100%; }
        .close-lightbox {
            position: absolute;
            top: 20px; right: 20px;
            color: #fff;
            font-size: 30px;
            padding: 10px;
            z-index: 1001;
        }

        /* --- 底部 --- */
        .footer { text-align: center; padding: 30px 0; font-size: 12px; color: #ccc; }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <!-- 导航 -->
    <div class="nav-bar">
        <div class="back-btn" id="backBtn">❮ 返回</div>
        <div class="nav-title" id="navTitle">宣讲回顾</div>
        <div style="width: 40px;"></div>
    </div>

    <!-- 首页：列表 -->
    <div id="homePage" class="page active">
        <div id="schoolList"></div>
        <div class="footer">© 2023 校园招聘项目组</div>
    </div>

    <!-- 详情页：照片 -->
    <div id="detailPage" class="page">
        <div class="detail-header">
            <div class="detail-title" id="detailTitle">学校名称</div>
            <div class="detail-date" id="detailDate">日期</div>
        </div>
        <div class="photo-wall" id="photoWall"></div>
    </div>
</div>

<!-- 看图器 -->
<div class="lightbox" id="lightbox">
    <div class="close-lightbox" id="closeLightbox">&times;</div>
    <img src="" id="lightboxImg">
</div>

<script>
    // ================= 数据配置区 =================
    const schools = [
        {

                "images/上海海事大学/45602bae87b22a71c5e8b18884e77c91.jpg",
                "images/上海海事大学/a469cee2b1ae767d1da3135780dd7e1a.jpg"
            ]
        }, 
        {
            id: 2,
            name: "上海理工大学",
            date: "2026-3-27",
            photos: [
                "images/上海理工大学/8f641ee87a4e3d6d5630e9b04be2f59a.jpg",
                "images/上海理工大学/9dfe84cdeb49f80f6acb1ba35f4032da.jpg",
                "images/上海理工大学/9fef6b09ff57ea2a0b3177051ae5ae39.jpg"
            ]
        },
        {
            id: 3,
            name: "上海建桥学院",
            date: "2026-4-2",
            photos: [
                "images/上海建桥学院/2aea0828167e28ffddc042e0b7843fa0.jpg",
                "images/上海建桥学院/cb1e0bef03db8807433882bfd38e9cc6.jpg",
                "images/上海建桥学院/ec38fb1d5a419e3d6982f69afdbbd436.jpg"
            ]
        },
         {
            id: 4,
            name: "安徽信息工程学院",
            date: "2026-4-8",
            photos: [
                "images/安徽信息工程学院/46a65a8d731b6c7ba5cc4431498aa5e0.jpg",
                "images/安徽信息工程学院/47446067926379058fad61545c926b06.jpg",
                "images/安徽信息工程学院/d1ef08c90a10de6c564787f63047b7fa.jpg"
            ]
        },
         {
            id: 5,
            name: "安徽建筑大学",
            date: "2026-4-17",
            photos: [
                "images/安徽建筑大学/cb5aae746f3f547662620e04163dd663.jpg",
                "images/安徽建筑大学/e87664c1ed466394b69ceabf253cea08.jpg",
                "images/安徽建筑大学/f4308d046c828377874b6b8a081184fe.jpg"
            ]
        },
         {
            id: 6,
            name: "中国传媒大学",
            date: "2026-4-23",
            photos: [
                "images/中国传媒大学/6ab8986c3c96ccb86d15dae6dfae42c3.jpg",

                "images/中国传媒大学/eb3f83df840994571b5c667b117ba8e0.jpg"
            ]
        }
        
    ];

    // ================= 逻辑控制区 =================
    const homePage = document.getElementById('homePage');
    const detailPage = document.getElementById('detailPage');
    const backBtn = document.getElementById('backBtn');
    const navTitle = document.getElementById('navTitle');
    const schoolListEl = document.getElementById('schoolList');
    const photoWallEl = document.getElementById('photoWall');
    const detailTitleEl = document.getElementById('detailTitle');
    const detailDateEl = document.getElementById('detailDate');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    // 初始化
    function init() {
        renderList();
        // 微信环境优化：设置顶部栏颜色为白色
        setWeChatBarColor('#ffffff');
    }

    // 渲染列表
    function renderList() {
        let html = '';
        schools.forEach(school => {
            html += `
                <div class="school-card" onclick="goToDetail(${school.id})">
                    <div class="card-info">
                        <h3>${school.name}</h3>
                        <p>${school.date}</p>
                    </div>
                    <div class="arrow">›</div>
                </div>
            `;
        });
        schoolListEl.innerHTML = html;
    }

    // 跳转详情
    window.goToDetail = function(id) {
        const school = schools.find(s => s.id === id);
        if(!school) return;

        detailTitleEl.innerText = school.name;
        detailDateEl.innerText = school.date;
        
        let photosHtml = '';
        school.photos.forEach(src => {
            photosHtml += `<div class="photo-item" onclick="openLightbox('${src}')"><img src="${src}" loading="lazy"></div>`;
        });
        photoWallEl.innerHTML = photosHtml;

        // 切换页面
        homePage.classList.remove('active');
        detailPage.classList.add('active');
        backBtn.style.display = 'block';
        navTitle.innerText = '详情';
        
        // 滚动到顶部
        document.getElementById('appContainer').scrollTop = 0;
    };

    // 返回
    backBtn.onclick = function() {
        detailPage.classList.remove('active');
        homePage.classList.add('active');
        backBtn.style.display = 'none';
        navTitle.innerText = '宣讲回顾';
    };

    // 看图器
    window.openLightbox = function(src) {
        lightboxImg.src = src;
        lightbox.classList.add('show');
    };

    document.getElementById('closeLightbox').onclick = function() {
        lightbox.classList.remove('show');
    };
    
    // 点击背景关闭
    lightbox.onclick = function(e) {
        if(e.target === lightbox) lightbox.classList.remove('show');
    };

    // 微信专用：尝试修改顶部状态栏颜色 (部分新版微信支持)
    function setWeChatBarColor(color) {
    }

    init();
</script>
</body>
</html>
